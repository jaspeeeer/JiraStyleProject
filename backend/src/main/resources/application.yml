spring:
  application:
    name: intrack-backend
  profiles:
    default: local
  jpa:
    hibernate:
      ddl-auto: validate   # Hibernate never creates/alters schema — Flyway owns the schema.
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

intrack:
  api:
    base-path: /api/v1
  app:
    # Base URL of the frontend — used in emailed links and as the CORS origin.
    frontend-base-url: http://localhost:3000
  jwt:
    # Dev-only secret. Override intrack.jwt.secret in every non-local environment.
    secret: "change-me-dev-only-secret-please-use-a-long-random-256-bit-value-1234567890"
    access-ttl: PT15M
    refresh-ttl: P7D
    cookie-secure: false      # true in production (HTTPS)
    cookie-same-site: Lax
